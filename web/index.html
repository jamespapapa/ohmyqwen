<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ohmyqwen Runtime Console</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 1.5rem;
        color: #111;
      }

      .row {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      textarea,
      input,
      select,
      button {
        font: inherit;
      }

      textarea {
        width: 100%;
        min-height: 90px;
      }

      pre {
        background: #f5f5f5;
        padding: 0.75rem;
        border-radius: 8px;
        overflow-x: auto;
      }

      .panel {
        margin-top: 1rem;
      }

      .timeline-item {
        border-left: 3px solid #888;
        padding-left: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <h1>ohmyqwen Runtime Console</h1>

    <div class="panel">
      <label for="task">Task</label>
      <textarea id="task" placeholder="Describe run objective"></textarea>
    </div>

    <div class="row">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="auto">auto</option>
        <option value="feature">feature</option>
        <option value="refactor">refactor</option>
        <option value="medium">medium</option>
        <option value="microservice">microservice</option>
      </select>

      <label for="dryRun">Dry-run</label>
      <input type="checkbox" id="dryRun" />

      <button id="startBtn">Start Run</button>
    </div>

    <div class="panel">
      <strong>Run ID:</strong> <span id="runId">-</span>
      <br />
      <strong>Status:</strong> <span id="status">idle</span>
      <br />
      <span id="error" class="error"></span>
    </div>

    <div class="panel">
      <h3>Timeline</h3>
      <div id="timeline"></div>
    </div>

    <div class="panel">
      <h3>Artifacts</h3>
      <pre id="artifacts">[]</pre>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
