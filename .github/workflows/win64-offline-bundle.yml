name: win64-offline-bundle

on:
  workflow_dispatch:
    inputs:
      require_models:
        description: "Fail when local GGUF models are missing"
        required: true
        type: boolean
        default: false
      include_node_runtime:
        description: "Bundle the runner's Node runtime into the zip"
        required: true
        type: boolean
        default: false

jobs:
  build-win64-offline:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install console dependencies
        run: pnpm --dir console-next install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Build console
        run: pnpm ui:build

      - name: Check qmd offline runtime health (models optional)
        if: ${{ !inputs.require_models }}
        run: node ./scripts/verify-offline-win64.mjs --require-models false

      - name: Check qmd offline runtime health (models required)
        if: ${{ inputs.require_models }}
        run: node ./scripts/verify-offline-win64.mjs

      - name: Capture Node runtime for bundle
        if: ${{ inputs.include_node_runtime }}
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source
          $nodeDir = Split-Path -Parent $nodePath
          "OHMYQWEN_NODE_RUNTIME_DIR=$nodeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Bundling Node runtime from $nodeDir"

      - name: Build Windows offline bundle
        shell: pwsh
        run: ./scripts/bundle-offline-win64.ps1

      - name: Build Windows console offline bundle
        shell: pwsh
        run: ./scripts/bundle-console-win64.ps1

      - name: Upload backend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohmyqwen-offline-win64-backend
          path: release/ohmyqwen-offline-win64-v*.zip
          if-no-files-found: error

      - name: Upload frontend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohmyqwen-offline-win64-frontend
          path: release/ohmyqwen-console-offline-win64-v*.zip
          if-no-files-found: error

      - name: Job summary
        shell: pwsh
        run: |
          @"
          ## Windows x64 offline bundle

          - require_models: ${{ inputs.require_models }}
          - include_node_runtime: ${{ inputs.include_node_runtime }}
          - backend artifact: `ohmyqwen-offline-win64-backend`
          - frontend artifact: `ohmyqwen-offline-win64-frontend`
          - download both from the workflow run page
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
